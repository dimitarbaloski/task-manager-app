version: '3.8'

services:
  postgres-db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_DB: taskmanagerdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - task-net

  backend:
    image: ${DOCKER_USERNAME}/taskmanagerapp-backend:${BRANCH_NAME}-latest
    ports:
      - "8082:8082"
    depends_on:
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/taskmanagerdb
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    networks:
      - task-net

  frontend:
    image: ${DOCKER_USERNAME}/taskmanagerapp-frontend:${BRANCH_NAME}-latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - task-net

networks:
  task-net:

volumes:
  postgres_data:
